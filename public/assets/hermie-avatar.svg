<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Hermie Byte Badger mascot">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="0.65" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 .65 0" result="cyanGlow"/>
      <feMerge><feMergeNode in="cyanGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="368" fill="#050b15" stroke="#123047" stroke-width="18"/>
  <circle cx="512" cy="512" r="334" fill="none" stroke="#22d3ee" stroke-width="10" opacity="0.9" filter="url(#glow)"/>

  <!-- ears -->
  <path d="M276 333 L192 177 L243 430 Z" fill="#101827" stroke="#22d3ee" stroke-width="22" stroke-linejoin="round"/>
  <path d="M748 333 L832 177 L781 430 Z" fill="#101827" stroke="#22d3ee" stroke-width="22" stroke-linejoin="round"/>
  <path d="M236 254 L212 197 L240 337 Z" fill="#f97316" opacity="0.95"/>
  <path d="M788 254 L812 197 L784 337 Z" fill="#f97316" opacity="0.95"/>

  <!-- head -->
  <path d="M260 342 C322 225 438 174 512 174 C586 174 702 225 764 342 L712 684 C650 785 577 823 512 823 C447 823 374 785 312 684 Z" fill="#eef8ed" stroke="#22d3ee" stroke-width="24" stroke-linejoin="round"/>

  <!-- badger stripe -->
  <path d="M382 232 C436 184 484 172 512 172 C540 172 588 184 642 232 C592 353 548 512 512 716 C476 512 432 353 382 232 Z" fill="#0b1220"/>
  <path d="M512 182 C512 182 512 529 512 724" stroke="#111827" stroke-width="20" stroke-linecap="round" opacity="0.25"/>

  <!-- eyes -->
  <circle cx="395" cy="493" r="42" fill="#07111f"/>
  <circle cx="629" cy="493" r="42" fill="#07111f"/>
  <circle cx="405" cy="483" r="15" fill="#67e8f9"/>
  <circle cx="639" cy="483" r="15" fill="#67e8f9"/>

  <!-- nose + mouth -->
  <path d="M512 548 L466 606 H558 Z" fill="#f97316" stroke="#111827" stroke-width="8" stroke-linejoin="round"/>
  <path d="M450 660 C486 695 538 695 574 660" fill="none" stroke="#111827" stroke-width="22" stroke-linecap="round"/>

  <!-- subtle tool/cursor badge -->
  <path d="M695 650 L787 742" fill="none" stroke="#f97316" stroke-width="30" stroke-linecap="round"/>
  <circle cx="813" cy="768" r="35" fill="none" stroke="#f97316" stroke-width="22"/>

  <!-- tiny terminal/circuit accent -->
  <path d="M299 632 H379" stroke="#22d3ee" stroke-width="18" stroke-linecap="round"/>
  <path d="M725 632 H645" stroke="#22d3ee" stroke-width="18" stroke-linecap="round"/>
</svg>
